bundle:
  name: knowledge-assistant-deployment

include:
  - variables.yml

# Workspace host per target:
#   - For local CLI: uncomment and set 'host' below, or use a 'profile'
#     that maps to a host in ~/.databrickscfg.
#   - For CI/CD: set the DATABRICKS_HOST env var (e.g. from GitHub secrets
#     STAGING_HOST / PROD_HOST). The CLI uses it when 'host' is not set.

targets:
  dev:
    mode: development
    workspace:
      # host: https://dev-workspace.cloud.databricks.com
      # profile: dev

  staging:
    workspace:
      # host: https://staging-workspace.cloud.databricks.com
      # profile: fevm

  prod:
    workspace:
      # host: https://prod-workspace.cloud.databricks.com
      # profile: demow

resources:
  jobs:
    batch_deploy_agents:
      name: "Batch Deploy Agents"
      parameters:
        - name: catalog
          default: ${var.target_catalog}
        - name: schema
          default: ${var.target_schema}
        - name: status_table_name
          default: ${var.status_table_name}
        - name: source_host
          default: ${var.source_host}
        - name: source_token
          default: ${var.source_token}
        - name: source_client_id
          default: ${var.source_client_id}
        - name: source_client_secret
          default: ${var.source_client_secret}
      # ---------------------------------------------------------------
      # Compute configuration
      # ---------------------------------------------------------------
      # Option 1: Classic compute (default — works for cross-cloud/
      #           cross-workspace deployments without SNP restrictions).
      #
      # Option 2: Serverless compute (faster cold start, no cluster to
      #           manage, but may fail with "Cert validation" errors on
      #           cross-cloud API calls due to SNP restrictions).
      #
      # To switch: comment out the unwanted option and uncomment the
      # other in both the job-level config and the task-level config.
      # ---------------------------------------------------------------

      # --- Option 1: Classic compute ---
      job_clusters:
        - job_cluster_key: deploy_cluster
          new_cluster:
            spark_version: ${var.cluster_spark_version}
            node_type_id: ${var.cluster_node_type}
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"
              spark.databricks.cluster.profile: singleNode
            custom_tags:
              ResourceClass: SingleNode

      # --- Option 2: Serverless compute (uncomment to use) ---
      # environments:
      #   - environment_key: default
      #     spec:
      #       client: "1"
      #       dependencies:
      #         - databricks-sdk>=0.40.0

      tasks:
        - task_key: batch_deploy
          notebook_task:
            notebook_path: ./src/orchestrator.py
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              status_table_name: "{{job.parameters.status_table_name}}"
              source_host: "{{job.parameters.source_host}}"
              source_token: "{{job.parameters.source_token}}"
              source_client_id: "{{job.parameters.source_client_id}}"
              source_client_secret: "{{job.parameters.source_client_secret}}"
          # --- Option 1: Classic compute ---
          job_cluster_key: deploy_cluster
          libraries:
            - pypi:
                package: databricks-sdk>=0.40.0
          # --- Option 2: Serverless compute (uncomment to use) ---
          # environment_key: default

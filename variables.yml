variables:
  target_catalog:
    description: "Target catalog name"
    default: "main"
  target_schema:
    description: "Target schema name"
    default: "default"
  status_table_name:
    description: "Fully qualified Delta table for batch deployment status tracking (default: {catalog}.{schema}.ka_deployment_status)"
    default: ""
  source_host:
    description: "Source workspace URL for cross-workspace export (blank = same workspace)"
    default: ""
  source_client_id:
    description: "Source workspace service principal client ID"
    default: ""
  source_client_secret:
    description: "Source workspace service principal client secret"
    default: ""


targets:
  dev:
    variables:
      target_catalog: "dev_catalog"
      target_schema: "dev_schema"

  staging:
    variables:
      target_catalog: "serverless_stable_14ey07_catalog"
      target_schema: "mbi"

  prod:
    variables:
      target_catalog: "main"
      target_schema: "deploy"

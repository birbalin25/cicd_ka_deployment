variables:
  env_prefix:
    description: "Environment prefix for job names (no trailing space), e.g. Prod_ / Staging_ / Dev_"
    default: "Dev_"
  target_catalog:
    description: "Target catalog namee"
    default: "main"
  target_schema:
    description: "Target schema name"
    default: "default"
  status_table_name:
    description: "Fully qualified Delta table for batch deployment status tracking (default: {catalog}.{schema}.ka_deployment_status)"
    default: ""
  source_host:
    description: "Source workspace URL for cross-workspace export (blank = same workspace)"
    default: "https://adb-7405617211688462.2.azuredatabricks.net"
  secret_scope:
    description: "Databricks secret scope containing source workspace credentials (keys: source-token, source-client-id, source-client-secret)"
    default: "ka-deployment"
  budget_policy_id:
    description: "Budget policy ID for serverless jobs. Leave empty to use the platform default. Find IDs via: databricks budget-policies list"
    default: "511dfd24-7efe-312e-8213-04f11f170b29"
  wait_and_copy_examples:
    description: "If true, deploy job waits for KA ACTIVE state and copies examples inline. If false, examples are deferred to the Copy KA Examples job."
    default: "false"
  since_timestamp:
    description: "Copy KA Examples job: if set, only process deploy rows with completed_at newer than this timestamp (e.g. '2026-07-15 00:00:00'). Empty = process latest run."
    default: "2026-07-16T06:13:58"
  cluster_spark_version:
    description: "Spark version for classic compute (ignored when compute_type=serverless)"
    default: "15.4.x-scala2.12"
  cluster_node_type:
    description: "Node type for classic compute (ignored when compute_type=serverless)"
    default: "Standard_DS3_v2"


targets:
  dev:
    variables:
      env_prefix: "Dev_"
      target_catalog: "dev_catalog"
      target_schema: "dev_schema"

  staging:
    variables:
      env_prefix: "Staging_"
      target_catalog: "dev"
      target_schema: "birschema"
      # Azure workspaces use different node types
      # cluster_node_type: "Standard_DS3_v2"

  prod:
    variables:
      env_prefix: "Prod_"
      target_catalog: "dev"
      target_schema: "birschema"

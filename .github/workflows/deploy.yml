name: Deploy Knowledge Assistants

on:
  push:
    branches: [main]
    paths:
      - 'configs/**'
      - 'src/**'
      - 'variables.yml'
      - 'databricks.yml'
  workflow_dispatch:  # allow manual trigger

# Authentication & Host Configurationn
# ------------------------------------
# For the TARGET workspace, set these in GitHub secrets:
#   - STAGING_HOST / PROD_HOST (workspace URL, e.g. https://xyz.cloud.databricks.com)
#   - DATABRICKS_CLIENT_ID + DATABRICKS_CLIENT_SECRET (Service Principal)
#   - STAGING_TOKEN / PROD_TOKEN (PAT — fallback if SP fails)
#   The workflow tries SP first; if it fails, falls back to PAT.
#
# For the SOURCE workspace, set these in GitHub secrets:
#   - SOURCE_HOST (source workspace URL)
#   - SOURCE_CLIENT_ID + SOURCE_CLIENT_SECRET (Service Principal)
#   - SOURCE_TOKEN (PAT — fallback if SP not set)
#   The orchestrator tries SP first; if not set, falls back to PAT.

jobs:
  # -------------------------------------------------------------------
  # Staging
  # -------------------------------------------------------------------
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Deploy bundle to staging
        run: |
          # Try Service Principal first
          if [ -n "$_CLIENT_ID" ] && [ -n "$_CLIENT_SECRET" ]; then
            echo "Trying Service Principal authentication..."
            export DATABRICKS_CLIENT_ID="$_CLIENT_ID"
            export DATABRICKS_CLIENT_SECRET="$_CLIENT_SECRET"
            if databricks bundle deploy -t staging \
                --var="source_host=$_SOURCE_HOST" \
                --var="source_token=$_SOURCE_TOKEN" \
                --var="source_client_id=$_SOURCE_CLIENT_ID" \
                --var="source_client_secret=$_SOURCE_CLIENT_SECRET"; then
              exit 0
            fi
            echo "Service Principal auth failed, falling back to PAT..."
            unset DATABRICKS_CLIENT_ID DATABRICKS_CLIENT_SECRET
          fi

          # Fall back to PAT
          if [ -n "$_TOKEN" ]; then
            echo "Trying PAT authentication..."
            export DATABRICKS_TOKEN="$_TOKEN"
            databricks bundle deploy -t staging \
              --var="source_host=$_SOURCE_HOST" \
              --var="source_token=$_SOURCE_TOKEN" \
              --var="source_client_id=$_SOURCE_CLIENT_ID" \
              --var="source_client_secret=$_SOURCE_CLIENT_SECRET"
          else
            echo "Error: No credentials configured. Set SP (DATABRICKS_CLIENT_ID + DATABRICKS_CLIENT_SECRET) or PAT (STAGING_TOKEN) in GitHub secrets."
            exit 1
          fi
        env:
          DATABRICKS_HOST: ${{ secrets.STAGING_HOST }}
          _TOKEN: ${{ secrets.STAGING_TOKEN }}
          _CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          _CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          _SOURCE_HOST: ${{ secrets.SOURCE_HOST }}
          _SOURCE_TOKEN: ${{ secrets.SOURCE_TOKEN }}
          _SOURCE_CLIENT_ID: ${{ secrets.SOURCE_CLIENT_ID }}
          _SOURCE_CLIENT_SECRET: ${{ secrets.SOURCE_CLIENT_SECRET }}

      - name: Run batch deployment
        run: |
          # Try Service Principal first
          if [ -n "$_CLIENT_ID" ] && [ -n "$_CLIENT_SECRET" ]; then
            echo "Trying Service Principal authentication..."
            export DATABRICKS_CLIENT_ID="$_CLIENT_ID"
            export DATABRICKS_CLIENT_SECRET="$_CLIENT_SECRET"
            if databricks bundle run batch_deploy_agents -t staging \
                -p source_host=${{ secrets.SOURCE_HOST }} \
                -p source_token=${{ secrets.SOURCE_TOKEN }} \
                -p source_client_id=${{ secrets.SOURCE_CLIENT_ID }} \
                -p source_client_secret=${{ secrets.SOURCE_CLIENT_SECRET }}; then
              exit 0
            fi
            echo "Service Principal auth failed, falling back to PAT..."
            unset DATABRICKS_CLIENT_ID DATABRICKS_CLIENT_SECRET
          fi

          # Fall back to PAT
          if [ -n "$_TOKEN" ]; then
            echo "Trying PAT authentication..."
            export DATABRICKS_TOKEN="$_TOKEN"
            databricks bundle run batch_deploy_agents -t staging \
              -p source_host=${{ secrets.SOURCE_HOST }} \
              -p source_token=${{ secrets.SOURCE_TOKEN }} \
              -p source_client_id=${{ secrets.SOURCE_CLIENT_ID }} \
              -p source_client_secret=${{ secrets.SOURCE_CLIENT_SECRET }}
          else
            echo "Error: No credentials configured. Set SP (DATABRICKS_CLIENT_ID + DATABRICKS_CLIENT_SECRET) or PAT (STAGING_TOKEN) in GitHub secrets."
            exit 1
          fi
        env:
          DATABRICKS_HOST: ${{ secrets.STAGING_HOST }}
          _TOKEN: ${{ secrets.STAGING_TOKEN }}
          _CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          _CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

  # -------------------------------------------------------------------
  # Production (requires manual approval)
  # -------------------------------------------------------------------
  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Deploy bundle to prod
        run: |
          # Try Service Principal first
          if [ -n "$_CLIENT_ID" ] && [ -n "$_CLIENT_SECRET" ]; then
            echo "Trying Service Principal authentication..."
            export DATABRICKS_CLIENT_ID="$_CLIENT_ID"
            export DATABRICKS_CLIENT_SECRET="$_CLIENT_SECRET"
            if databricks bundle deploy -t prod \
                --var="source_host=$_SOURCE_HOST" \
                --var="source_token=$_SOURCE_TOKEN" \
                --var="source_client_id=$_SOURCE_CLIENT_ID" \
                --var="source_client_secret=$_SOURCE_CLIENT_SECRET"; then
              exit 0
            fi
            echo "Service Principal auth failed, falling back to PAT..."
            unset DATABRICKS_CLIENT_ID DATABRICKS_CLIENT_SECRET
          fi

          # Fall back to PAT
          if [ -n "$_TOKEN" ]; then
            echo "Trying PAT authentication..."
            export DATABRICKS_TOKEN="$_TOKEN"
            databricks bundle deploy -t prod \
              --var="source_host=$_SOURCE_HOST" \
              --var="source_token=$_SOURCE_TOKEN" \
              --var="source_client_id=$_SOURCE_CLIENT_ID" \
              --var="source_client_secret=$_SOURCE_CLIENT_SECRET"
          else
            echo "Error: No credentials configured. Set SP (DATABRICKS_CLIENT_ID + DATABRICKS_CLIENT_SECRET) or PAT (PROD_TOKEN) in GitHub secrets."
            exit 1
          fi
        env:
          DATABRICKS_HOST: ${{ secrets.PROD_HOST }}
          _TOKEN: ${{ secrets.PROD_TOKEN }}
          _CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          _CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          _SOURCE_HOST: ${{ secrets.SOURCE_HOST }}
          _SOURCE_TOKEN: ${{ secrets.SOURCE_TOKEN }}
          _SOURCE_CLIENT_ID: ${{ secrets.SOURCE_CLIENT_ID }}
          _SOURCE_CLIENT_SECRET: ${{ secrets.SOURCE_CLIENT_SECRET }}

      - name: Run batch deployment
        run: |
          # Try Service Principal first
          if [ -n "$_CLIENT_ID" ] && [ -n "$_CLIENT_SECRET" ]; then
            echo "Trying Service Principal authentication..."
            export DATABRICKS_CLIENT_ID="$_CLIENT_ID"
            export DATABRICKS_CLIENT_SECRET="$_CLIENT_SECRET"
            if databricks bundle run batch_deploy_agents -t prod \
                -p source_host=${{ secrets.SOURCE_HOST }} \
                -p source_token=${{ secrets.SOURCE_TOKEN }} \
                -p source_client_id=${{ secrets.SOURCE_CLIENT_ID }} \
                -p source_client_secret=${{ secrets.SOURCE_CLIENT_SECRET }}; then
              exit 0
            fi
            echo "Service Principal auth failed, falling back to PAT..."
            unset DATABRICKS_CLIENT_ID DATABRICKS_CLIENT_SECRET
          fi

          # Fall back to PAT
          if [ -n "$_TOKEN" ]; then
            echo "Trying PAT authentication..."
            export DATABRICKS_TOKEN="$_TOKEN"
            databricks bundle run batch_deploy_agents -t prod \
              -p source_host=${{ secrets.SOURCE_HOST }} \
              -p source_token=${{ secrets.SOURCE_TOKEN }} \
              -p source_client_id=${{ secrets.SOURCE_CLIENT_ID }} \
              -p source_client_secret=${{ secrets.SOURCE_CLIENT_SECRET }}
          else
            echo "Error: No credentials configured. Set SP (DATABRICKS_CLIENT_ID + DATABRICKS_CLIENT_SECRET) or PAT (PROD_TOKEN) in GitHub secrets."
            exit 1
          fi
        env:
          DATABRICKS_HOST: ${{ secrets.PROD_HOST }}
          _TOKEN: ${{ secrets.PROD_TOKEN }}
          _CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          _CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

name: Deploy Knowledge Assistants

on:
  push:
    branches: [main]
    paths:
      - 'configs/**'
      - 'src/**'
      - 'variables.yml'
      - 'databricks.yml'
  workflow_dispatch:  # allow manual trigger

jobs:
  # -------------------------------------------------------------------
  # Staging
  # -------------------------------------------------------------------
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Deploy bundle to staging
        run: databricks bundle deploy -t staging
        env:
          DATABRICKS_HOST: ${{ secrets.STAGING_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

      - name: Run batch deployment
        run: |
          databricks bundle run batch_deploy_agents -t staging \
            -p source_host=${{ secrets.SOURCE_HOST }} \
            -p source_client_id=${{ secrets.SOURCE_CLIENT_ID }} \
            -p source_client_secret=${{ secrets.SOURCE_CLIENT_SECRET }}
        env:
          DATABRICKS_HOST: ${{ secrets.STAGING_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

  # -------------------------------------------------------------------
  # Production (requires manual approval)
  # -------------------------------------------------------------------
  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Deploy bundle to prod
        run: databricks bundle deploy -t prod
        env:
          DATABRICKS_HOST: ${{ secrets.PROD_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

      - name: Run batch deployment
        run: |
          databricks bundle run batch_deploy_agents -t prod \
            -p source_host=${{ secrets.SOURCE_HOST }} \
            -p source_client_id=${{ secrets.SOURCE_CLIENT_ID }} \
            -p source_client_secret=${{ secrets.SOURCE_CLIENT_SECRET }}
        env:
          DATABRICKS_HOST: ${{ secrets.PROD_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

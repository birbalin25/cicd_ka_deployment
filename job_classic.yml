# Classic compute configuration for the batch deployment job.
# Uses a single-node job cluster — works for cross-cloud/cross-workspace
# deployments without serverless SNP restrictions.
#
# To use: include this file in databricks.yml
#   include:
#     - variables.yml
#     - job_classic.yml

resources:
  jobs:
    batch_deploy_agents:
      name: "${var.env_prefix}Batch_Deploy_Agents"
      parameters:
        - name: catalog
          default: ${var.target_catalog}
        - name: schema
          default: ${var.target_schema}
        - name: status_table_name
          default: ${var.status_table_name}
        - name: source_host
          default: ${var.source_host}
        - name: secret_scope
          default: ${var.secret_scope}
        - name: wait_and_copy_examples
          default: ${var.wait_and_copy_examples}
        - name: deploy_wait_minutes
          default: ${var.deploy_wait_minutes}
      job_clusters:
        - job_cluster_key: deploy_cluster
          new_cluster:
            spark_version: ${var.cluster_spark_version}
            node_type_id: ${var.cluster_node_type}
            data_security_mode: SINGLE_USER
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"
              spark.databricks.cluster.profile: singleNode
            custom_tags:
              ResourceClass: SingleNode
      tasks:
        - task_key: batch_deploy
          notebook_task:
            notebook_path: ./src/orchestrator.py
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              status_table_name: "{{job.parameters.status_table_name}}"
              source_host: "{{job.parameters.source_host}}"
              secret_scope: "{{job.parameters.secret_scope}}"
              wait_and_copy_examples: "{{job.parameters.wait_and_copy_examples}}"
              deploy_wait_minutes: "{{job.parameters.deploy_wait_minutes}}"
          job_cluster_key: deploy_cluster
          libraries:
            - pypi:
                package: databricks-sdk>=0.40.0

    copy_examples_job:
      name: "${var.env_prefix}Copy_KA_Examples"
      parameters:
        - name: catalog
          default: ${var.target_catalog}
        - name: schema
          default: ${var.target_schema}
        - name: status_table_name
          default: ${var.status_table_name}
        - name: source_host
          default: ${var.source_host}
        - name: secret_scope
          default: ${var.secret_scope}
        - name: run_id
          default: ""
        - name: since_timestamp
          default: ${var.since_timestamp}
        - name: copy_wait_minutes
          default: ${var.copy_wait_minutes}
      job_clusters:
        - job_cluster_key: deploy_cluster
          new_cluster:
            spark_version: ${var.cluster_spark_version}
            node_type_id: ${var.cluster_node_type}
            data_security_mode: SINGLE_USER
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"
              spark.databricks.cluster.profile: singleNode
            custom_tags:
              ResourceClass: SingleNode
      tasks:
        - task_key: copy_examples
          notebook_task:
            notebook_path: ./src/copy_examples.py
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              status_table_name: "{{job.parameters.status_table_name}}"
              source_host: "{{job.parameters.source_host}}"
              secret_scope: "{{job.parameters.secret_scope}}"
              run_id: "{{job.parameters.run_id}}"
              since_timestamp: "{{job.parameters.since_timestamp}}"
              copy_wait_minutes: "{{job.parameters.copy_wait_minutes}}"
          job_cluster_key: deploy_cluster
          libraries:
            - pypi:
                package: databricks-sdk>=0.40.0
